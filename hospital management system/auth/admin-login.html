<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Mulla Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Animated Background Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1" style="background: var(--secondary);"></div>
        <div class="blob blob-2" style="background: var(--primary);"></div>
    </div>

    <div class="container login-wrapper">
        <div class="row w-100 justify-content-center slide-up">
            <div class="col-md-6 col-lg-5 col-xl-4">
                
                <div class="text-center mb-4">
                    <a href="../index.html" class="text-decoration-none h3 fw-bold text-gradient">
                        <i class="fa-solid fa-notes-medical me-2"></i>Mulla Hospital
                    </a>
                </div>

                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <div class="bg-secondary bg-opacity-10 text-white mx-auto rounded-circle d-flex align-items-center justify-content-center mb-3 shadow-sm" style="width: 70px; height: 70px; font-size: 1.8rem; background: var(--secondary);">
                            <i class="fa-solid fa-user-shield"></i>
                        </div>
                        <h4 class="fw-bold mb-1">Admin Portal</h4>
                        <p style="opacity: 0.7; font-size: 0.9rem;">Sign in to manage system</p>
                    </div>

                    <form id="loginForm">
                        <input type="hidden" id="loginRole" value="admin">
                        
                        <div class="mb-3">
                            <label class="form-label fw-medium small" style="opacity: 0.8;">Email Address</label>
                            <input type="email" class="form-control form-control-lg bg-transparent text-main border-secondary border-opacity-25" id="email" value="admin@demo.com" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-medium small" style="opacity: 0.8;">Password</label>
                            <input type="password" class="form-control form-control-lg bg-transparent text-main border-secondary border-opacity-25" id="password" value="demo" required>
                        </div>

                        <button type="submit" class="btn btn-glass text-white w-100 py-3 rounded-3 fw-bold mb-3 border-0 shadow-sm" style="background: linear-gradient(135deg, var(--secondary), #f472b6);">
                            Sign In
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="../index.html" class="text-decoration-none small" style="opacity: 0.7;"><i class="fa-solid fa-arrow-left me-1"></i> Back to Portals</a>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button id="theme-toggle" class="btn btn-glass rounded-pill px-4 shadow-sm">
                        <i class="fa-solid fa-moon me-2"></i> Toggle Theme
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
